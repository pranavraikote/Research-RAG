services:
  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./artifacts:/app/artifacts   # FAISS index, BM25, chunks — pre-built, must exist locally
      - ./logs:/app/logs
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-ResearchRAG}
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    volumes:
      - ~/.ollama:/root/.ollama   # use locally pulled models — no download needed
    ports:
      - "11435:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 12
    restart: unless-stopped
